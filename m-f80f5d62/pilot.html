<style>

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0b1526;color:#e8eef8;font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic Medium","Noto Sans JP",sans-serif;line-height:1.7}
  .app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,var(--dk),var(--dk2))}
  .pilotbar{background:#3d3d3d;color:#fff;font-size:10.5px;padding:4px 12px;text-align:center}
  .pilotbar b{color:#ffd27a}
  .appbar{display:flex;align-items:center;gap:9px;padding:14px 18px 6px}

  label{display:block;font-size:11.5px;color:var(--ice);margin:10px 0 4px}
  label small{color:var(--gray);font-weight:400}
  input[type=number],input[type=text],select{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:10px;color:#fff;font-size:15px;padding:10px 12px;outline:none;font-family:inherit}
  input:focus,select:focus{border-color:var(--accent)}
  select{appearance:none}
  .rowx{display:flex;gap:10px}
  .rowx>div{flex:1}
  .seg{display:flex;gap:8px;margin-top:4px}
  .seg div{flex:1;text-align:center;border:1px solid var(--line);border-radius:11px;padding:10px 4px;font-size:12px;color:var(--ice);cursor:pointer;user-select:none}

  .meaning{font-size:12.5px;color:#dbe5f5;border-left:3px solid var(--accent);padding-left:10px;margin:9px 0}

  .chip{display:inline-block;border:1px solid var(--line);border-radius:99px;padding:2px 10px;font-size:10.5px;color:var(--ice);margin:2px 4px 2px 0}
  .chip.on{border-color:var(--gold);color:#e8dcc0}
  .vbadge{display:inline-block;border:1px solid rgba(159,212,163,.6);color:var(--green);border-radius:99px;font-size:9.5px;padding:1px 8px;font-weight:700}
  .vbadge.pend{border-color:rgba(202,220,252,.4);color:var(--gray)}
  .pbcard{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:10px 13px;margin-bottom:8px}
  .pbcard .rid{font-size:10px;color:var(--gold);font-weight:800;letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center;gap:6px}
  .pbcard h5{font-size:13px;margin:3px 0 3px}
  .pbcard p{font-size:10.5px;color:var(--gray)}
  .pbcard p b{color:var(--ice)}
  .pltable{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:8px 0}
  .plrow{display:flex;justify-content:space-between;align-items:baseline;padding:8px 13px;border-bottom:1px solid rgba(202,220,252,.08);font-size:12px}
  .plrow:last-child{border-bottom:none}
  .plrow .k{color:#dbe5f5}.plrow .k small{display:block;color:var(--gray);font-size:9.5px}
  .plrow .v{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;text-align:right}
  .plrow .v small{font-size:9.5px;color:var(--gray);font-weight:400}
  .guard{background:linear-gradient(135deg,rgba(159,212,163,.12),rgba(159,212,163,.03));border:1px solid rgba(159,212,163,.4);border-radius:13px;padding:10px 13px;font-size:12px;color:#dbe5f5;margin:8px 0}
  .guard b{color:#fff}
  .footnote{font-size:9.5px;color:#6d7b93;text-align:center;margin:14px 0 4px;line-height:1.7}
  .tabbar{position:fixed;bottom:0;left:0;right:0;max-width:440px;margin:0 auto;display:flex;border-top:1px solid var(--line);background:rgba(11,21,38,.97);padding:8px 0 20px;backdrop-filter:blur(8px)}
  .tab{flex:1;text-align:center;font-size:10px;color:var(--gray);cursor:pointer;user-select:none}
  .tab.on{color:var(--gold);font-weight:700}
  .tab i{display:block;width:20px;height:20px;margin:0 auto 3px;border-radius:6px;background:currentColor;opacity:.28}
  .tab.on i{opacity:.9}
  .empty{color:var(--gray);font-size:12px;text-align:center;padding:20px 8px}
  .legendrow{display:flex;gap:10px;font-size:10px;color:var(--gray);margin-top:6px;flex-wrap:wrap}
  .legendrow span::before{content:"●";margin-right:3px}
  .lg-meal::before{color:var(--pink)} .lg-band::before{color:#7fa8e0}
  .story{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:9px 13px;margin-bottom:8px;font-size:12px;color:#dbe5f5}
  .story .lab2{font-size:9.5px;letter-spacing:.14em;color:var(--gold);font-weight:800;display:block;margin-bottom:2px}
  .story b{color:#fff}
  .danger{color:#e8a0a8}
  .mini{font-size:10.5px;color:var(--gray)}
  textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:10px;color:#fff;font-size:13px;padding:9px 12px;outline:none;font-family:inherit;resize:vertical;min-height:44px}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--gold);color:#20293a;font-weight:700;font-size:12.5px;border-radius:99px;padding:8px 20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  details{margin:8px 0}
  summary{font-size:12px;color:var(--ice);cursor:pointer;padding:6px 0}
</style>

<body>
<!-- VERSION_TAG: KANZO_PILOT_v0.4_REALDATA-15SEC_20260713 -->
<!-- 内部向け「事業計画データv2バナー」は会員第一号の実利用画面に不適のため除去（v0.4）。事業計画の最新決裁はclaude/00・claude/29等の台帳で管理する。 -->
<div id="lsWarn" style="display:none;max-width:440px;margin:0 auto;background:#7a2230;color:#ffe3e8;font-size:12px;line-height:1.6;padding:11px 16px;text-align:center"></div>
<div class="app">
  <div class="pilotbar"><b>PILOT v0.4｜会員第一号エディション（実データ入力用・15秒緩和版プロトコル対応）</b>｜データは端末内のみ・外部送信ゼロ｜数値は参考値であり診断ではありません</div>
  <div class="appbar"><div class="mk" id="logo"></div><b>肝臓株式会社</b><span class="date" id="hdrDate"></span></div>
  <main id="main"></main>
  <div class="tabbar">
    <div class="tab on" data-t="today"><i></i>今日</div>
    <div class="tab" data-t="garden"><i></i>庭</div>
    <div class="tab" data-t="talk"><i></i>はなす</div>
    <div class="tab" data-t="book"><i></i>説明書</div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
/* ================= KANZO Pilot v0.1 =================
   すべてローカル（localStorage）。外部送信は一切なし。
   CSVスキーマ: date,rhr_bpm,weight_kg,bedtime_slot,dinner_last_night,feel,rules_kept,note
==================================================== */
const LS='kanzo_pilot_v01';
const BEDS=['21時台','22時台','23時台','23時半以降','24時以降'];
const seedRules=[
 {id:'R-01',cat:'睡眠',title:'帰宅後すぐ入浴 → 22時台に就寝',n:0,ok:0,active:true},
 {id:'R-03',cat:'会食',title:'最初の1杯は30分かけて',n:0,ok:0,active:true},
 {id:'R-08',cat:'会食',title:'〆の炭水化物は半分にする',n:0,ok:0,active:true}
];
let LS_OK=true;
function lsAvailable(){try{const k='__kanzo_t__';localStorage.setItem(k,'1');localStorage.removeItem(k);return true;}catch(e){return false;}}
function showLsWarn(){const w=document.getElementById('lsWarn');if(w){w.style.display='block';w.innerHTML='⚠ このブラウザではデータを保存できません（プライベート/シークレットモードの可能性）。データを残すには<b>通常のウィンドウ</b>で開いてください。';}}
let S=load();
function load(){
  LS_OK=lsAvailable();
  if(!LS_OK)showLsWarn();
  try{const d=JSON.parse(localStorage.getItem(LS));if(d&&d.days)return d;}catch(e){}
  return {days:{},rules:JSON.parse(JSON.stringify(seedRules)),started:today()};
}
function save(){try{localStorage.setItem(LS,JSON.stringify(S));LS_OK=true;return true;}catch(e){LS_OK=false;showLsWarn();return false;}}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function jdate(iso){const d=new Date(iso+'T00:00:00');return (d.getMonth()+1)+'月'+d.getDate()+'日（'+'日月火水木金土'[d.getDay()]+'）';}
function sortedDates(){return Object.keys(S.days).sort();}
function entries(){return sortedDates().map(k=>({date:k,...S.days[k]}));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}

/* --- 平常値バンド: 直近21件のRHRの p25〜p75（最小幅4bpm）。7件未満は確立中 --- */
function baseline(){
  const v=entries().filter(e=>e.rhr).slice(-21).map(e=>+e.rhr).sort((a,b)=>a-b);
  if(v.length<7)return {ready:false,count:v.length};
  const q=p=>{const i=(v.length-1)*p,lo=Math.floor(i),hi=Math.ceil(i);return v[lo]+(v[hi]-v[lo])*(i-lo);};
  let lo=Math.round(q(.25)),hi=Math.round(q(.75));const med=Math.round(q(.5));
  if(hi-lo<4){lo=med-2;hi=med+2;}
  return {ready:true,lo,hi,med,count:v.length};
}
/* --- 今日の1枚（ルールベース・全文仮説形） --- */
function insight(dk){
  const e=S.days[dk]||{};const b=baseline();
  const y=S.days[addDays(dk,-1)]||{};
  const no=Object.keys(S.days).length;
  if(!e.rhr)return null;
  const r=+e.rhr;
  let head='',mean='',act='';
  const kept=(y.rules_kept||[]).map(id=>S.rules.find(x=>x.id===id)).filter(Boolean);
  if(!b.ready){
    head=`計測 ${no}回目。あなたの「平常値」が形になるまで、あと ${Math.max(0,7-b.count)}回。`;
    mean='意味: いまは基準線を作る期間です。良し悪しの判定はまだしません——毎朝の1分だけが仕事です。';
    act='今日の一手: 今夜も同じ時刻・同じ姿勢で。条件を揃えるほど、基準線は正確になります。';
  }else if(e.dinner){
    const d=r-b.med;
    head=`昨夜の会食、今朝の心拍は ${d>=0?'+':''}${d}（平常値 ${b.med} 比）。`+(kept.length?`守った ${kept.map(k=>k.id).join('・')} が効いた可能性があります。`:'');
    mean = r<=b.hi ? '意味: 会食翌朝としては平常域に収まっています。昨夜の設計が機能した、という仮説が立ちます。'
                   : '意味: 平常域より上で戻ってきています。責める材料ではなく、回復にかかる時間を知るデータが1つ増えた、と読みます。';
    act = r<=b.hi ? '今日の一手: この成功パターンを再現できるか、次の会食でもう一度だけ試してみます。'
                  : '今日の一手: 今夜は22時台就寝で回復を優先。明朝、戻りの速さを確認します。';
  }else if(e.bed!=null&&e.bed<=1&&r<=b.med){
    head=`昨夜は${BEDS[e.bed]}就寝。今朝は ${r}bpm——平常値の中心より下です。`;
    mean='意味: 早い就寝の翌朝に数値が沈む傾向が、あなたのデータで再現しつつあります。';
    act='今日の一手: 特にありません。この調子です（引き延ばしません）。';
  }else if(r>b.hi){
    head=`今朝は ${r}bpm。あなたの平常域（${b.lo}–${b.hi}）より少し上です。`;
    mean='意味: 単発なら誤差の範囲。2日続くなら、直近の睡眠・予定と突き合わせて原因の仮説を立てます——それが「防衛」の仕事です。';
    act='今日の一手: 今夜は予定を1つ軽くして、就寝を30分前へ。明朝の戻りで答え合わせをします。';
  }else{
    head=`今朝は ${r}bpm——平常域（${b.lo}–${b.hi}）の中です。異常なし。`;
    mean='意味: 良い意味で、書くことがありません。監視は続いています。';
    act='今日の一手: なし。良い一日を（今日はここで終わりです）。';
  }
  return {head,mean,act,no};
}
/* --- ルール検証: 昨日の夜に守ったルール × 今朝のRHRが平常域(+1許容)内 → ok++ --- */
function creditRules(dk){
  const y=S.days[addDays(dk,-1)];const e=S.days[dk];const b=baseline();
  if(!y||!e||!e.rhr||!b.ready||!(y.rules_kept||[]).length||e._credited)return;
  const success=+e.rhr<=b.hi+1;
  y.rules_kept.forEach(id=>{const ru=S.rules.find(x=>x.id===id);if(ru){ru.n++;if(success)ru.ok++;}});
  e._credited=true;save();
}
/* ================= views ================= */
const main=document.getElementById('main');
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function vToday(){
  const dk=today();const e=S.days[dk]||{};creditRules(dk);
  const ins=insight(dk);const b=baseline();
  const streak=(()=>{let n=0,d=dk;while(S.days[d]&&S.days[d].rhr){n++;d=addDays(d,-1);}return n;})();
  let h=`<h2>おはようございます。<small>朝の入力は60秒だけ——それが唯一の義務です。</small></h2>`;
  h+=`<div class="card"><div class="lab">MORNING｜朝の計測入力 ${e.rhr?'✓ 入力済':''}</div>
    <p class="mini" style="margin:-2px 0 8px;line-height:1.6">起床直後、15秒の緩和版計測（立てかける・逆光だけ避ける・いつも通り）で得た値、またはウェアラブルの安静時心拍を入力。完璧でなくて大丈夫です。</p>
    <div class="rowx"><div><label>安静時心拍 <small>(bpm・起床直後)</small></label><input type="number" id="inRhr" inputmode="numeric" placeholder="62" value="${e.rhr||''}"></div>
    <div><label>体重 <small>(kg・任意)</small></label><input type="number" id="inW" step="0.1" inputmode="decimal" placeholder="任意" value="${e.w||''}"></div></div>
    <label>昨夜の就寝</label><select id="inBed">${BEDS.map((b2,i)=>`<option value="${i}" ${e.bed==i?'selected':''}>${b2}</option>`).join('')}</select>
    <label>昨夜は会食でしたか</label><div class="seg" id="segDin"><div data-v="0" class="${e.dinner===false?'sel':''}">なし</div><div data-v="1" class="${e.dinner===true?'sel':''}">会食だった</div></div>
    <button class="btn" id="btnSave">保存して「今日の1枚」を見る</button>
    <div class="done">計測 ${Object.values(S.days).filter(x=>x.rhr).length}回目${streak>1?`・${streak}日連続`:''}｜今日の1分も、平常値の精度を上げる資産になります</div></div>`;
  if(ins){
    h+=`<div class="card"><div class="lab">#${ins.no}｜今日の1枚 — あなたのデータから</div><h4>${ins.head}</h4>
      ${b.ready?`<div class="fact"><div class="n">${e.rhr}<small>今朝 bpm</small></div><div class="n" style="color:var(--gray)">${b.med}<small>あなたの平常値</small></div><div class="n" style="color:#7fa8e0">${b.lo}–${b.hi}<small>平常域</small></div></div>`:''}
      <div class="meaning">${ins.mean}</div><div class="action"><b>今日の一手</b>${ins.act.replace('今日の一手: ','')}</div>
      <div class="done">読了——今日はここまで。</div></div>`;
  }
  h+=`<div class="card"><div class="lab">NIGHT｜夜の10秒チェックイン（任意）</div>
    <label>今日の身体は</label><div class="seg" id="segFeel">${['軽い','ふつう','重い'].map((f,i)=>`<div data-v="${i}" class="${e.feel===i?'sel':''}"><i>${['○','◎','△'][i]}</i>${f}</div>`).join('')}</div>
    <label>今夜/今日、守ったルール <small>(タップで選択→明朝の数値で答え合わせ)</small></label>
    <div id="keptWrap">${S.rules.filter(r=>r.active).map(r=>`<span class="chip ${(e.rules_kept||[]).includes(r.id)?'on':''}" data-rid="${r.id}">${r.id} ${esc(r.title)}</span>`).join('')||'<span class="mini">説明書タブでルールを追加できます</span>'}</div>
    <label>ひとこと <small>(任意)</small></label><textarea id="inNote" placeholder="例: 〆は断れた">${esc(e.note||'')}</textarea>
    <button class="btn sub" id="btnNight">チェックインを保存（10秒で終わり）</button>
    <div class="done">責めない・催促しない・書かない日があっていい</div></div>`;
  h+=`<div class="footnote">本アプリはウェルネス目的の参考情報です。疾病の診断・治療・予防を目的としません。<br>データは端末内（このブラウザ）のみに保存され、外部へ送信されません。</div>`;
  main.innerHTML=h;
  document.getElementById('btnSave').onclick=()=>{
    const r=+document.getElementById('inRhr').value;
    if(!r||r<25||r>200){toast('心拍を確認してください');return;}
    const d=S.days[dk]||(S.days[dk]={});
    d.rhr=r;const w=document.getElementById('inW').value;if(w)d.w=+w;
    d.bed=+document.getElementById('inBed').value;
    const ok=save();creditRules(dk);toast(ok?'保存しました':'保存できません（通常ウィンドウで開いてください）');render();
  };
  document.querySelectorAll('#segDin div').forEach(el=>el.onclick=()=>{
    const d=S.days[dk]||(S.days[dk]={});d.dinner=el.dataset.v==='1';save();render();
  });
  document.querySelectorAll('#segFeel div').forEach(el=>el.onclick=()=>{
    const d=S.days[dk]||(S.days[dk]={});d.feel=+el.dataset.v;save();render();
  });
  document.querySelectorAll('#keptWrap .chip').forEach(el=>el.onclick=()=>{

function renderWeekView(es,b){

function renderMonthView(es,b){
  const ym=today().slice(0,7);const m=es.filter(e=>e.date.startsWith(ym));
  if(m.length<3)return `<div class="empty">今月のデータが3件以上たまると月次カレンダーが表示されます。<br>現在 ${m.length}件。</div>`;
  const [yr,mo]=ym.split('-').map(n=>+n);
  const first=new Date(yr,mo-1,1);const last=new Date(yr,mo,0);
  const daysInMonth=last.getDate();const firstDow=first.getDay();
  const byDate={};m.forEach(e=>{byDate[e.date]=e;});
  let cells='';
  for(let i=0;i<firstDow;i++){cells+=`<div style="padding:6px 3px;text-align:center;font-size:9px;color:#3d4a63"></div>`;}
  for(let d=1;d<=daysInMonth;d++){
    const dkey=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const e=byDate[dkey];
    let bg='rgba(255,255,255,.03)';let dot='';let feelEmo='';
    if(e){
      if(b.ready){
        const r=+e.rhr;
        if(r<b.lo)bg='rgba(127,168,224,.18)';
        else if(r>b.hi)bg='rgba(232,160,168,.22)';
        else bg='rgba(159,212,163,.16)';
      } else bg='rgba(201,163,83,.14)';
      dot=`<div style="font-size:9.5px;color:#dbe5f5;margin-top:1px">${e.rhr}</div>`;
      if(e.feel===0)feelEmo='<span style="font-size:9px">○</span>';
      else if(e.feel===1)feelEmo='<span style="font-size:9px">◎</span>';
      else if(e.feel===2)feelEmo='<span style="font-size:9px;color:#e8a0a8">△</span>';
    }
    cells+=`<div style="padding:5px 2px;text-align:center;background:${bg};border-radius:5px;font-size:9.5px;line-height:1.2;min-height:36px">${d}<br>${dot}${feelEmo}</div>`;
  }
  let h=`<div class="card"><div class="lab">MONTHLY｜${mo}月のカレンダー（進行中）</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:8px 0;font-size:9px;color:var(--gray)">
      <div style="text-align:center">日</div><div style="text-align:center">月</div><div style="text-align:center">火</div><div style="text-align:center">水</div><div style="text-align:center">木</div><div style="text-align:center">金</div><div style="text-align:center">土</div>
    </div>

    <div class="legendrow" style="margin-top:10px"><span style="color:#7fa8e0">●</span>平常域より低い <span style="color:#9fd4a3">●</span>平常域内 <span style="color:#e8a0a8">●</span>平常域より高い</div></div>`;
  if(m.length>=10){
    const mFeel=m.filter(e=>e.feel!==2&&e.feel!=null).length;
    const mDin=m.filter(e=>e.dinner).length;
    const mEarly=m.filter(e=>e.bed!=null&&e.bed<=1).length;

    h+=`<div class="card"><div class="lab">身体の月次決算（${mo}月・進行中）</div>
      <div class="pltable">
        <div class="plrow"><span class="k">快調日数<small>体感「軽い・ふつう」</small></span><span class="v">${mFeel}<small>/${m.length}日</small></span></div>
        <div class="plrow"><span class="k">会食<small>こなした回数</small></span><span class="v">${mDin}<small>回</small></span></div>
        <div class="plrow"><span class="k">22時台就寝</span><span class="v">${mEarly}<small>日</small></span></div>
        <div class="plrow"><span class="k">検証済みルール<small>説明書の資産</small></span><span class="v">${ver}<small>本</small></span></div>

      if(!confirm('全データを消去します。エクスポートは済んでいますか？'))return;
      localStorage.removeItem(LS);S=load();save();toast('消去しました');render();
    };
  };
  // details を開いたときに bind（初回のためbindSettings一度呼ぶ）
  bindSettings();
  document.querySelector('details').ontoggle=bindSettings;
}

/* ================= router ================= */
let TAB='today';
function render(){
  document.getElementById('hdrDate').innerHTML=jdate(today())+'<br>会員 No.001';
  ({today:vToday,garden:vGarden,talk:vTalk,book:vBook})[TAB]();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.t===TAB));
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{TAB=t.dataset.t;render();window.scrollTo(0,0);});
render();
</script>
