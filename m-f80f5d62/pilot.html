<style>

  .plrow .v{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;text-align:right}

  .guard b{color:#fff}

  .legendrow span::before{content:"в—Ҹ";margin-right:3px}
  .lg-meal::before{color:var(--pink)} .lg-band::before{color:#7fa8e0}
  .story{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:9px 13px;margin-bottom:8px;font-size:12px;color:#dbe5f5}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--gold);color:#20293a;font-weight:700;font-size:12.5px;border-radius:99px;padding:8px 20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  details{margin:8px 0}

<body>
<div class="app">
  <div class="pilotbar"><b>PILOT v0.1пҪңдјҡе“Ўз¬¬дёҖеҸ·гӮЁгғҮгӮЈгӮ·гғ§гғі</b>пҪңгғҮгғјгӮҝгҒҜз«Ҝжң«еҶ…гҒ®гҒҝгғ»еӨ–йғЁйҖҒдҝЎгӮјгғӯпҪңж•°еҖӨгҒҜеҸӮиҖғеҖӨгҒ§гҒӮгӮҠиЁәж–ӯгҒ§гҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>
  <div class="appbar"><div class="mk" id="logo"></div><b>иӮқиҮ“ж ӘејҸдјҡзӨҫ</b><span class="date" id="hdrDate"></span></div>
  <main id="main"></main>
  <div class="tabbar">
    <div class="tab on" data-t="today"><i></i>д»Ҡж—Ҙ</div>
    <div class="tab" data-t="trend"><i></i>гғҲгғ¬гғігғү</div>
    <div class="tab" data-t="book"><i></i>иӘ¬жҳҺжӣё</div>
    <div class="tab" data-t="story"><i></i>зү©иӘһ</div>
    <div class="tab" data-t="setting"><i></i>иЁӯе®ҡ</div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
/* ================= KANZO Pilot v0.1 =================
   гҒҷгҒ№гҒҰгғӯгғјгӮ«гғ«пјҲlocalStorageпјүгҖӮеӨ–йғЁйҖҒдҝЎгҒҜдёҖеҲҮгҒӘгҒ—гҖӮ
   CSVгӮ№гӮӯгғјгғһ: date,rhr_bpm,weight_kg,bedtime_slot,dinner_last_night,feel,rules_kept,note
==================================================== */
const LS='kanzo_pilot_v01';
const BEDS=['21жҷӮеҸ°','22жҷӮеҸ°','23жҷӮеҸ°','23жҷӮеҚҠд»ҘйҷҚ','24жҷӮд»ҘйҷҚ'];
const seedRules=[
 {id:'R-01',cat:'зқЎзң ',title:'её°е®…еҫҢгҒҷгҒҗе…Ҙжөҙ вҶ’ 22жҷӮеҸ°гҒ«е°ұеҜқ',n:0,ok:0,active:true},
 {id:'R-03',cat:'дјҡйЈҹ',title:'жңҖеҲқгҒ®1жқҜгҒҜ30еҲҶгҒӢгҒ‘гҒҰ',n:0,ok:0,active:true},
 {id:'R-08',cat:'дјҡйЈҹ',title:'гҖҶгҒ®зӮӯж°ҙеҢ–зү©гҒҜеҚҠеҲҶгҒ«гҒҷгӮӢ',n:0,ok:0,active:true}
];
let S=load();
function load(){
  try{const d=JSON.parse(localStorage.getItem(LS));if(d&&d.days)return d;}catch(e){}
  return {days:{},rules:JSON.parse(JSON.stringify(seedRules)),started:today()};
}
function save(){localStorage.setItem(LS,JSON.stringify(S));}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function jdate(iso){const d=new Date(iso+'T00:00:00');return (d.getMonth()+1)+'жңҲ'+d.getDate()+'ж—ҘпјҲ'+'ж—ҘжңҲзҒ«ж°ҙжңЁйҮ‘еңҹ'[d.getDay()]+'пјү';}
function sortedDates(){return Object.keys(S.days).sort();}
function entries(){return sortedDates().map(k=>({date:k,...S.days[k]}));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}

/* --- е№іеёёеҖӨгғҗгғігғү: зӣҙиҝ‘21д»¶гҒ®RHRгҒ® p25гҖңp75пјҲжңҖе°Ҹе№…4bpmпјүгҖӮ7д»¶жңӘжәҖгҒҜзўәз«Ӣдёӯ --- */
function baseline(){
  const v=entries().filter(e=>e.rhr).slice(-21).map(e=>+e.rhr).sort((a,b)=>a-b);
  if(v.length<7)return {ready:false,count:v.length};
  const q=p=>{const i=(v.length-1)*p,lo=Math.floor(i),hi=Math.ceil(i);return v[lo]+(v[hi]-v[lo])*(i-lo);};
  let lo=Math.round(q(.25)),hi=Math.round(q(.75));const med=Math.round(q(.5));
  if(hi-lo<4){lo=med-2;hi=med+2;}
  return {ready:true,lo,hi,med,count:v.length};
}
/* --- д»Ҡж—ҘгҒ®1жһҡпјҲгғ«гғјгғ«гғҷгғјгӮ№гғ»е…Ёж–Үд»®иӘ¬еҪўпјү --- */
function insight(dk){
  const e=S.days[dk]||{};const b=baseline();
  const y=S.days[addDays(dk,-1)]||{};
  const no=Object.keys(S.days).length;
  if(!e.rhr)return null;
  const r=+e.rhr;
  let head='',mean='',act='';
  const kept=(y.rules_kept||[]).map(id=>S.rules.find(x=>x.id===id)).filter(Boolean);
  if(!b.ready){
    head=`иЁҲжё¬ ${no}еӣһзӣ®гҖӮгҒӮгҒӘгҒҹгҒ®гҖҢе№іеёёеҖӨгҖҚгҒҢеҪўгҒ«гҒӘгӮӢгҒҫгҒ§гҖҒгҒӮгҒЁ ${Math.max(0,7-b.count)}еӣһгҖӮ`;
    mean='ж„Ҹе‘і: гҒ„гҒҫгҒҜеҹәжә–з·ҡгӮ’дҪңгӮӢжңҹй–“гҒ§гҒҷгҖӮиүҜгҒ—жӮӘгҒ—гҒ®еҲӨе®ҡгҒҜгҒҫгҒ гҒ—гҒҫгҒӣгӮ“вҖ”вҖ”жҜҺжңқгҒ®1еҲҶгҒ гҒ‘гҒҢд»•дәӢгҒ§гҒҷгҖӮ';
    act='д»Ҡж—ҘгҒ®дёҖжүӢ: д»ҠеӨңгӮӮеҗҢгҒҳжҷӮеҲ»гғ»еҗҢгҒҳе§ҝеӢўгҒ§гҖӮжқЎд»¶гӮ’жҸғгҒҲгӮӢгҒ»гҒ©гҖҒеҹәжә–з·ҡгҒҜжӯЈзўәгҒ«гҒӘгӮҠгҒҫгҒҷгҖӮ';
  }else if(e.dinner){
    const d=r-b.med;
    head=`жҳЁеӨңгҒ®дјҡйЈҹгҖҒд»ҠжңқгҒ®еҝғжӢҚгҒҜ ${d>=0?'+':''}${d}пјҲе№іеёёеҖӨ ${b.med} жҜ”пјүгҖӮ`+(kept.length?`е®ҲгҒЈгҒҹ ${kept.map(k=>k.id).join('гғ»')} гҒҢеҠ№гҒ„гҒҹеҸҜиғҪжҖ§гҒҢгҒӮгӮҠгҒҫгҒҷгҖӮ`:'');
    mean = r<=b.hi ? 'ж„Ҹе‘і: дјҡйЈҹзҝҢжңқгҒЁгҒ—гҒҰгҒҜе№іеёёеҹҹгҒ«еҸҺгҒҫгҒЈгҒҰгҒ„гҒҫгҒҷгҖӮжҳЁеӨңгҒ®иЁӯиЁҲгҒҢж©ҹиғҪгҒ—гҒҹгҖҒгҒЁгҒ„гҒҶд»®иӘ¬гҒҢз«ӢгҒЎгҒҫгҒҷгҖӮ'
                   : 'ж„Ҹе‘і: е№іеёёеҹҹгӮҲгӮҠдёҠгҒ§жҲ»гҒЈгҒҰгҒҚгҒҰгҒ„гҒҫгҒҷгҖӮиІ¬гӮҒгӮӢжқҗж–ҷгҒ§гҒҜгҒӘгҒҸгҖҒеӣһеҫ©гҒ«гҒӢгҒӢгӮӢжҷӮй–“гӮ’зҹҘгӮӢгғҮгғјгӮҝгҒҢ1гҒӨеў—гҒҲгҒҹгҖҒгҒЁиӘӯгҒҝгҒҫгҒҷгҖӮ';
    act = r<=b.hi ? 'д»Ҡж—ҘгҒ®дёҖжүӢ: гҒ“гҒ®жҲҗеҠҹгғ‘гӮҝгғјгғігӮ’еҶҚзҸҫгҒ§гҒҚгӮӢгҒӢгҖҒж¬ЎгҒ®дјҡйЈҹгҒ§гӮӮгҒҶдёҖеәҰгҒ гҒ‘и©ҰгҒ—гҒҰгҒҝгҒҫгҒҷгҖӮ'
                  : 'д»Ҡж—ҘгҒ®дёҖжүӢ: д»ҠеӨңгҒҜ22жҷӮеҸ°е°ұеҜқгҒ§еӣһеҫ©гӮ’е„Әе…ҲгҖӮжҳҺжңқгҖҒжҲ»гӮҠгҒ®йҖҹгҒ•гӮ’зўәиӘҚгҒ—гҒҫгҒҷгҖӮ';
  }else if(e.bed!=null&&e.bed<=1&&r<=b.med){
    head=`жҳЁеӨңгҒҜ${BEDS[e.bed]}е°ұеҜқгҖӮд»ҠжңқгҒҜ ${r}bpmвҖ”вҖ”е№іеёёеҖӨгҒ®дёӯеҝғгӮҲгӮҠдёӢгҒ§гҒҷгҖӮ`;
    mean='ж„Ҹе‘і: ж—©гҒ„е°ұеҜқгҒ®зҝҢжңқгҒ«ж•°еҖӨгҒҢжІҲгӮҖеӮҫеҗ‘гҒҢгҖҒгҒӮгҒӘгҒҹгҒ®гғҮгғјгӮҝгҒ§еҶҚзҸҫгҒ—гҒӨгҒӨгҒӮгӮҠгҒҫгҒҷгҖӮ';
    act='д»Ҡж—ҘгҒ®дёҖжүӢ: зү№гҒ«гҒӮгӮҠгҒҫгҒӣгӮ“гҖӮгҒ“гҒ®иӘҝеӯҗгҒ§гҒҷпјҲеј•гҒҚе»¶гҒ°гҒ—гҒҫгҒӣгӮ“пјүгҖӮ';
  }else if(r>b.hi){
    head=`д»ҠжңқгҒҜ ${r}bpmгҖӮгҒӮгҒӘгҒҹгҒ®е№іеёёеҹҹпјҲ${b.lo}вҖ“${b.hi}пјүгӮҲгӮҠе°‘гҒ—дёҠгҒ§гҒҷгҖӮ`;
    mean='ж„Ҹе‘і: еҚҳзҷәгҒӘгӮүиӘӨе·®гҒ®зҜ„еӣІгҖӮ2ж—Ҙз¶ҡгҒҸгҒӘгӮүгҖҒзӣҙиҝ‘гҒ®зқЎзң гғ»дәҲе®ҡгҒЁзӘҒгҒҚеҗҲгӮҸгҒӣгҒҰеҺҹеӣ гҒ®д»®иӘ¬гӮ’з«ӢгҒҰгҒҫгҒҷвҖ”вҖ”гҒқгӮҢгҒҢгҖҢйҳІиЎӣгҖҚгҒ®д»•дәӢгҒ§гҒҷгҖӮ';
    act='д»Ҡж—ҘгҒ®дёҖжүӢ: д»ҠеӨңгҒҜдәҲе®ҡгӮ’1гҒӨи»ҪгҒҸгҒ—гҒҰгҖҒе°ұеҜқгӮ’30еҲҶеүҚгҒёгҖӮжҳҺжңқгҒ®жҲ»гӮҠгҒ§зӯ”гҒҲеҗҲгӮҸгҒӣгӮ’гҒ—гҒҫгҒҷгҖӮ';
  }else{
    head=`д»ҠжңқгҒҜ ${r}bpmвҖ”вҖ”е№іеёёеҹҹпјҲ${b.lo}вҖ“${b.hi}пјүгҒ®дёӯгҒ§гҒҷгҖӮз•°еёёгҒӘгҒ—гҖӮ`;
    mean='ж„Ҹе‘і: иүҜгҒ„ж„Ҹе‘ігҒ§гҖҒжӣёгҒҸгҒ“гҒЁгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮзӣЈиҰ–гҒҜз¶ҡгҒ„гҒҰгҒ„гҒҫгҒҷгҖӮ';
    act='д»Ҡж—ҘгҒ®дёҖжүӢ: гҒӘгҒ—гҖӮиүҜгҒ„дёҖж—ҘгӮ’пјҲд»Ҡж—ҘгҒҜгҒ“гҒ“гҒ§зөӮгӮҸгӮҠгҒ§гҒҷпјүгҖӮ';
  }
  return {head,mean,act,no};
}
/* --- гғ«гғјгғ«жӨңиЁј: жҳЁж—ҘгҒ®еӨңгҒ«е®ҲгҒЈгҒҹгғ«гғјгғ« Г— д»ҠжңқгҒ®RHRгҒҢе№іеёёеҹҹ(+1иЁұе®№)еҶ… вҶ’ ok++ --- */
function creditRules(dk){
  const y=S.days[addDays(dk,-1)];const e=S.days[dk];const b=baseline();
  if(!y||!e||!e.rhr||!b.ready||!(y.rules_kept||[]).length||e._credited)return;
  const success=+e.rhr<=b.hi+1;
  y.rules_kept.forEach(id=>{const ru=S.rules.find(x=>x.id===id);if(ru){ru.n++;if(success)ru.ok++;}});
  e._credited=true;save();
}

      <div class="story"><span class="lab2">зҷәиҰӢ 2</span>22жҷӮеҸ°гҒҫгҒ§гҒ®е°ұеҜқгҒҢ <b>${early}ж—Ҙ</b>гҖӮ${early>=4?'гҒ“гҒ®зҝ’ж…ЈгҒҢгҒӮгҒӘгҒҹгҒ®еңҹеҸ°гҒ«гҒӘгӮҠгҒӨгҒӨгҒӮгӮҠгҒҫгҒҷгҖӮ':'жқҘйҖұгҖҒгҒӮгҒЁ1ж—ҘгҒ гҒ‘еў—гӮ„гҒӣгӮӢгҒӢи©ҰгҒ—гҒҫгҒҷгҖӮ'}</div>
      <div class="story"><span class="lab2">зҷәиҰӢ 3</span>дҪ“ж„ҹгҒҢгҖҢи»ҪгҒ„гғ»гҒөгҒӨгҒҶгҖҚгҒ гҒЈгҒҹж—ҘгҒҜ <b>${feelOK}ж—Ҙ</b>пјҲгғҒгӮ§гғғгӮҜгӮӨгғіеҲҶпјүгҖӮ</div>
      <div class="action"><b>жқҘйҖұгҒ®иЁӯиЁҲпјҲ1гҒӨгҒ гҒ‘пјү</b>${din>0?'ж¬ЎгҒ®дјҡйЈҹгҒ§гҖҒиӘ¬жҳҺжӣёгҒ®гғ«гғјгғ«гӮ’1жң¬гҒ гҒ‘жӨңиЁјгҒ—гҒҫгҒҷгҖӮ':'е°ұеҜқжҷӮеҲ»гӮ’1ж®өгҒ гҒ‘ж—©гӮҒгӮӢе®ҹйЁ“гӮ’гҒ—гҒҫгҒҷгҖӮ'}</div></div>`;
    /* monthly */
    const ym=today().slice(0,7);const m=es.filter(e=>e.date.startsWith(ym));
    if(m.length>=10){
      const mFeel=m.filter(e=>e.feel!==2&&e.feel!=null).length;
      const mDin=m.filter(e=>e.dinner).length;
      const mEarly=m.filter(e=>e.bed!=null&&e.bed<=1).length;
      const ver=S.rules.filter(r=>r.active&&r.n>=3&&r.ok/r.n>=.6).length;
      h+=`<div class="card"><div class="lab">MONTHLYпҪңиә«дҪ“гҒ®жңҲж¬Ўжұәз®—пјҲ${+ym.slice(5)}жңҲгғ»йҖІиЎҢдёӯпјү</div>
        <div class="pltable">
          <div class="plrow"><span class="k">еҝ«иӘҝж—Ҙж•°<small>дҪ“ж„ҹгҖҢи»ҪгҒ„гғ»гҒөгҒӨгҒҶгҖҚ</small></span><span class="v">${mFeel}<small>/${m.length}ж—Ҙ</small></span></div>
          <div class="plrow"><span class="k">дјҡйЈҹ<small>гҒ“гҒӘгҒ—гҒҹеӣһж•°</small></span><span class="v">${mDin}<small>еӣһ</small></span></div>
          <div class="plrow"><span class="k">22жҷӮеҸ°е°ұеҜқ</span><span class="v">${mEarly}<small>ж—Ҙ</small></span></div>
          <div class="plrow"><span class="k">жӨңиЁјжёҲгҒҝгғ«гғјгғ«<small>иӘ¬жҳҺжӣёгҒ®иіҮз”Ј</small></span><span class="v">${ver}<small>жң¬</small></span></div>
        </div>
        <div class="guard"><b>еҪ№еүІгҒ®е®ЈиЁҖ:</b> е№іеёёеҖӨгҒҢе®үе®ҡгҒ—гҒҹжңҲгҒ®з§ҒгҒҹгҒЎгҒ®д»•дәӢгҒҜгҖҒж”№е–„гҒ®жј”еҮәгҒ§гҒҜгҒӘгҒҸ<b>гҖҢеҙ©гӮҢгҒ®е…ҶеҖҷгӮ’гҒӮгҒӘгҒҹгӮҲгӮҠе…ҲгҒ«иҰӢгҒӨгҒ‘гӮӢгҒ“гҒЁгҖҚ</b>гҖӮз•°еёёгҒ®гҒӘгҒ„жңҲгҒҜгҖҢз•°еёёгҒӘгҒ—гҖҚгҒЁзҹӯгҒҸиЁҖгҒ„гҒҫгҒҷгҖӮ</div></div>`;
    }
  }
  h+=`<div class="footnote">ж•°еҖӨгҒҜгҒӮгҒӘгҒҹгҒ®иЁҳйҢІгҒ«еҹәгҒҘгҒҸеҸӮиҖғеҖӨгҒ§гҒҷгҖӮеҠ№жһңгӮ’дҝқиЁјгҒҷгӮӢгӮӮгҒ®гҒ§гҒҜгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ</div>`;
  main.innerHTML=h;
}
function vSetting(){
  const n=entries().length;
  let h=`<h2>иЁӯе®ҡгғ»гғҮгғјгӮҝ<small>гҒӮгҒӘгҒҹгҒ®гғҮгғјгӮҝгҒҜгҖҒгҒӮгҒӘгҒҹгҒ®гӮӮгҒ®</small></h2>`;
  h+=`<div class="card"><div class="lab">DATAпҪңгӮЁгӮҜгӮ№гғқгғјгғҲ / гӮӨгғігғқгғјгғҲ</div>
    <p class="mini" style="margin-bottom:8px">иЁҳйҢІ ${n}ж—ҘеҲҶгҖӮCSVгҒҜжӨңиЁјз”ЁгӮігғҜгғјгӮҜгғ»SalesforceеҸ–иҫјпјҲIF-01зӣёеҪ“пјүгҒЁдә’жҸӣгҒ®еҲ—иЁӯиЁҲгҒ§гҒҷгҖӮ</p>
    <button class="btn sub" id="btnCsv">CSVгӮ’гғҖгӮҰгғігғӯгғјгғүпјҲжӨңиЁјгғ»еҲҶжһҗз”Ёпјү</button>
    <button class="btn sub" id="btnJson">JSONгӮ’гғҖгӮҰгғігғӯгғјгғүпјҲе®Ңе…ЁгғҗгғғгӮҜгӮўгғғгғ—пјү</button>
    <label style="margin-top:12px">JSONгӮ’еҫ©е…ғ <small>(гғҗгғғгӮҜгӮўгғғгғ—гҒӢгӮү)</small></label><input type="file" id="inFile" accept=".json" style="font-size:12px;color:var(--gray)">
  </div>`;
  h+=`<div class="card"><div class="lab">PILOTпҪңгҒҠи©ҰгҒ—</div>
    <button class="btn sub" id="btnDemo">гғҮгғўгғҮгғјгӮҝгӮ’жҠ•е…ҘпјҲ14ж—ҘеҲҶгғ»гғҖгғҹгғјпјү</button>
    <p class="mini">з”»йқўгҒ®еӢ•гҒҚгӮ’е…ҲгҒ«иҰӢгҒҹгҒ„е ҙеҗҲгҒ«гҖӮе®ҹгғҮгғјгӮҝйҒӢз”ЁеүҚгҒ«гҖҢе…Ёж¶ҲеҺ»гҖҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</p>
    <button class="btn sub" id="btnWipe" style="border-color:rgba(232,160,168,.5);color:#e8a0a8">е…ЁгғҮгғјгӮҝгӮ’ж¶ҲеҺ»гҒҷгӮӢ</button></div>`;
  h+=`<div class="card"><div class="lab">ABOUT</div><p class="mini">иӮқиҮ“ж ӘејҸдјҡзӨҫ гғ‘гӮӨгғӯгғғгғҲзүҲ v0.1пјҲ2026-07-12пјүгҖӮгғўгғғгӮҜv0.3гҖҢиӘІйҮ‘з¶ҷз¶ҡгҒ®3еұӨпјҲиіҮз”Јгғ»з•Әдәәгғ»жұәз®—пјүгҖҚгҒ®е®ҹеғҚжӨңиЁјз”ЁгҖӮгғҮгғјгӮҝгҒҜз«Ҝжң«еҶ…гҒ®гҒҝгғ»еӨ–йғЁйҖҒдҝЎгӮјгғӯпјҲгғ—гғ©гӮӨгғҗгӮ·гғјгғ»гғҗгӮӨгғ»гғҮгӮ¶гӮӨгғіпјүгҖӮжң¬гӮўгғ—гғӘгҒҜгӮҰгӮ§гғ«гғҚгӮ№зӣ®зҡ„гҒ®еҸӮиҖғжғ…е ұгӮ’жҸҗдҫӣгҒҷгӮӢгӮӮгҒ®гҒ§гҒӮгӮҠгҖҒз–ҫз—…гҒ®иЁәж–ӯгғ»жІ»зҷӮгғ»дәҲйҳІгӮ’зӣ®зҡ„гҒЁгҒ—гҒҫгҒӣгӮ“гҖӮ</p></div>`;
  main.innerHTML=h;
  const dl=(name,text,type)=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();};
  document.getElementById('btnCsv').onclick=()=>{
    let csv='date,rhr_bpm,weight_kg,bedtime_slot,dinner_last_night,feel,rules_kept,note\n';
    entries().forEach(e=>{csv+=[e.date,e.rhr||'',e.w||'',e.bed!=null?BEDS[e.bed]:'',e.dinner?1:0,e.feel!=null?['light','normal','heavy'][e.feel]:'',(e.rules_kept||[]).join('|'),'"'+String(e.note||'').replace(/"/g,'""')+'"'].join(',')+'\n';});
    dl('kanzo_pilot_'+today()+'.csv',csv,'text/csv');toast('CSVгӮ’жӣёгҒҚеҮәгҒ—гҒҫгҒ—гҒҹ');
  };
  document.getElementById('btnJson').onclick=()=>{dl('kanzo_pilot_backup_'+today()+'.json',JSON.stringify(S,null,1),'application/json');toast('гғҗгғғгӮҜгӮўгғғгғ—гӮ’жӣёгҒҚеҮәгҒ—гҒҫгҒ—гҒҹ');};
  document.getElementById('inFile').onchange=ev=>{
    const f=ev.target.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{const d=JSON.parse(rd.result);if(d.days&&d.rules){S=d;save();toast('еҫ©е…ғгҒ—гҒҫгҒ—гҒҹ');render();}else toast('еҪўејҸгҒҢйҒ•гҒ„гҒҫгҒҷ');}catch(e){toast('иӘӯгҒҝиҫјгҒҝеӨұж•—');}};
    rd.readAsText(f);
  };
  document.getElementById('btnDemo').onclick=()=>{
    if(!confirm('гғҮгғўгғҮгғјгӮҝпјҲ14ж—ҘеҲҶгғ»гғҖгғҹгғјпјүгӮ’жҠ•е…ҘгҒ—гҒҫгҒҷгҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ'))return;
    const base=62;
    for(let i=14;i>=1;i--){
      const dk=addDays(today(),-i);
      const dinner=[3,6,9,12].includes(i);
      const bed=dinner?3:(i%3===0?2:1);
      const rhr=base+(dinner?4+Math.round(Math.random()*2):Math.round(Math.random()*3)-1)+(bed<=1?-1:0);
      S.days[dk]={rhr,bed,dinner,feel:rhr>base+4?2:(rhr<base?0:1),rules_kept:dinner?['R-03','R-08']:['R-01'],note:'',_credited:false};
    }
    /* run credits chronologically */
    sortedDates().forEach(dk=>creditRules(dk));
    save();toast('гғҮгғўгғҮгғјгӮҝгӮ’жҠ•е…ҘгҒ—гҒҫгҒ—гҒҹ');render();
  };
  document.getElementById('btnWipe').onclick=()=>{
    if(!confirm('е…ЁгғҮгғјгӮҝгӮ’ж¶ҲеҺ»гҒ—гҒҫгҒҷгҖӮгӮЁгӮҜгӮ№гғқгғјгғҲгҒҜжёҲгӮ“гҒ§гҒ„гҒҫгҒҷгҒӢпјҹ'))return;
    localStorage.removeItem(LS);S=load();save();toast('ж¶ҲеҺ»гҒ—гҒҫгҒ—гҒҹ');render();
  };
}

let TAB='today';
function render(){
  document.getElementById('hdrDate').innerHTML=jdate(today())+'<br>дјҡе“Ў No.001';
  ({today:vToday,trend:vTrend,book:vBook,story:vStory,setting:vSetting})[TAB]();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.t===TAB));
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{TAB=t.dataset.t;render();window.scrollTo(0,0);});
render();
</script>
